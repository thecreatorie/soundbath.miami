<style>
  /* ============================
     RESET
     ============================ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  img, svg { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { background: none; border: 0; cursor: pointer; font: inherit; color: inherit; }

  /* ============================
     TOKENS — v4 brief
     ============================ */
  :root {
    --oxblood:        #3A0E08;
    --vermilion:      #E94B26;
    --vermilion-mute: #A93620;
    --cream:          #F4E8D8;
    --cream-dim:      rgba(244,232,216,0.55);
    --cream-line:     rgba(244,232,216,0.18);
  }

  body {
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-weight: 400;
    font-size: 14px;
    line-height: 1.6;
    color: var(--cream);
    background: var(--oxblood);
    overflow-x: hidden;
  }

  /* ============================
     HEADER — sticky, mono caps
     ============================ */
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--oxblood);
    padding: 22px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--vermilion);
  }

  /* ============================
     HERO — wordmark always fills width edge-to-edge
     ============================ */
  .hero {
    min-height: calc(100vh - 60px);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 32px 48px;
    position: relative;
  }

  .wordmark-svg {
    display: block;
    width: 100%;
    height: auto;
    margin: 0;
    overflow: visible;
  }

  .wordmark-svg text {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 300px;
    fill: var(--vermilion);
  }

  .hero-subline {
    margin-top: 24px;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--cream);
    max-width: 640px;
  }

  /* ============================
     SECTION 1 — single line, breathing room (tightened)
     ============================ */
  .section-line {
    padding: clamp(96px, 14vh, 160px) 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .section-line p {
    font-family: 'Fraunces', Georgia, serif;
    font-optical-sizing: auto;
    font-weight: 400;
    font-style: italic;
    color: var(--cream);
    font-size: clamp(24px, 3.4vw, 40px);
    line-height: 1.25;
    letter-spacing: -0.01em;
    max-width: 22ch;
  }

  /* ============================
     SECTION 2 — FORM
     ============================ */
  .form-section {
    padding: clamp(80px, 12vh, 140px) 32px;
    border-top: 1px solid var(--cream-line);
  }

  .form-inner {
    max-width: 560px;
    margin: 0 auto;
  }

  .form-headline {
    font-family: 'Fraunces', Georgia, serif;
    font-optical-sizing: auto;
    font-weight: 500;
    color: var(--cream);
    font-size: clamp(36px, 6vw, 64px);
    line-height: 1.05;
    letter-spacing: -0.015em;
    margin-bottom: 56px;
  }

  /* HubSpot form overrides — sharp corners, vermilion underline focus, no boxes */
  .form-inner .hs-form-frame,
  .form-inner form { width: 100%; }

  .form-inner input[type="text"],
  .form-inner input[type="email"],
  .form-inner input[type="tel"],
  .form-inner input[type="number"],
  .form-inner select,
  .form-inner textarea {
    font-family: 'JetBrains Mono', ui-monospace, monospace !important;
    font-weight: 400 !important;
    font-size: 14px !important;
    color: var(--cream) !important;
    background: transparent !important;
    border: 0 !important;
    border-bottom: 1px solid var(--cream-line) !important;
    border-radius: 0 !important;
    padding: 14px 0 !important;
    width: 100% !important;
    outline: none !important;
    transition: border-color 0.2s ease !important;
    box-shadow: none !important;
  }

  .form-inner input::placeholder,
  .form-inner textarea::placeholder {
    color: var(--cream-dim) !important;
    font-family: 'JetBrains Mono', ui-monospace, monospace !important;
  }

  .form-inner input:focus,
  .form-inner select:focus,
  .form-inner textarea:focus {
    border-bottom-color: var(--vermilion) !important;
  }

  /* Field labels (First Name, Email, Interest Area, etc.) — CREAM for contrast */
  .form-inner label {
    font-family: 'JetBrains Mono', ui-monospace, monospace !important;
    font-weight: 400 !important;
    font-size: 11px !important;
    letter-spacing: 0.12em !important;
    text-transform: uppercase !important;
    color: var(--cream) !important;
    margin-bottom: 8px !important;
    display: block !important;
  }

  /* Required-field asterisk stays vermilion as a small accent */
  .form-inner label .hs-form-required,
  .form-inner .hs-form-required {
    color: var(--vermilion) !important;
    margin-left: 2px !important;
  }

  /* Checkbox + radio option labels (e.g. Sound Healing, Community) — also cream */
  .form-inner .hs-form-checkbox-display,
  .form-inner .hs-form-radio-display,
  .form-inner .hs-form-booleancheckbox-display,
  .form-inner .hs-form-checkbox-display span,
  .form-inner .hs-form-radio-display span,
  .form-inner .hs-form-booleancheckbox-display span,
  .form-inner ul.inputs-list label,
  .form-inner ul.inputs-list label span {
    color: var(--cream) !important;
    text-transform: none !important;
    letter-spacing: 0 !important;
    font-size: 13px !important;
    font-weight: 400 !important;
  }

  /* Tighter line-height on the option list */
  .form-inner ul.inputs-list {
    list-style: none !important;
    padding: 0 !important;
    margin: 0 !important;
  }
  .form-inner ul.inputs-list li {
    margin-bottom: 8px !important;
  }

  .form-inner .hs-error-msgs label,
  .form-inner .hs-error-msg {
    font-family: 'JetBrains Mono', ui-monospace, monospace !important;
    color: var(--vermilion) !important;
    font-size: 11px !important;
    letter-spacing: 0 !important;
    text-transform: lowercase !important;
    margin-top: 6px !important;
  }

  .form-inner input[type="submit"],
  .form-inner button[type="submit"],
  .form-inner .hs-button {
    font-family: 'JetBrains Mono', ui-monospace, monospace !important;
    font-weight: 500 !important;
    font-size: 12px !important;
    letter-spacing: 0.24em !important;
    text-transform: uppercase !important;
    background: var(--vermilion) !important;
    color: var(--cream) !important;
    border: 1px solid var(--vermilion) !important;
    padding: 18px 40px !important;
    border-radius: 0 !important;
    cursor: pointer !important;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease !important;
    width: auto !important;
    margin-top: 16px !important;
    box-shadow: none !important;
  }

  .form-inner input[type="submit"]:hover,
  .form-inner button[type="submit"]:hover,
  .form-inner .hs-button:hover {
    background: var(--cream) !important;
    color: var(--vermilion) !important;
    border-color: var(--cream) !important;
  }

  .form-inner .hs-form-booleancheckbox-display,
  .form-inner .legal-consent-container {
    font-family: 'JetBrains Mono', ui-monospace, monospace !important;
    font-size: 12px !important;
    color: var(--cream) !important;
    line-height: 1.55 !important;
  }

  .form-inner input[type="checkbox"],
  .form-inner input[type="radio"] {
    accent-color: var(--vermilion) !important;
  }

  .form-inner .submitted-message {
    font-family: 'Fraunces', Georgia, serif !important;
    font-style: italic !important;
    font-weight: 400 !important;
    font-size: clamp(28px, 4vw, 40px) !important;
    color: var(--cream) !important;
    line-height: 1.2 !important;
  }

  .form-inner .hs-form-field,
  .form-inner fieldset {
    margin-bottom: 28px !important;
    max-width: 100% !important;
  }

  /* ============================
     FOOTER — mono caps
     ============================ */
  .footer {
    border-top: 1px solid var(--cream-line);
    padding: 32px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream-dim);
  }

  .footer-top,
  .footer-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
  }

  .footer-top { margin-bottom: 32px; }
  .footer-brand { color: var(--vermilion); }
  .footer-meta { text-align: right; line-height: 1.8; }

  .footer-links { display: flex; gap: 28px; }
  .footer-links a { transition: color 0.2s ease; }
  .footer-links a:hover { color: var(--vermilion); }

  /* ============================
     RESPONSIVE
     ============================ */
  @media (max-width: 640px) {
    .header { padding: 18px 20px; font-size: 10px; letter-spacing: 0.14em; }
    .hero { padding: 0 20px 36px; }
    .hero-subline { font-size: 12px; }
    .section-line { padding: 80px 20px; }
    .form-section { padding: 80px 20px; }
    .footer { padding: 24px 20px; }
    .footer-top, .footer-bottom {
      flex-direction: column;
      gap: 16px;
      align-items: flex-start;
    }
    .footer-meta { text-align: left; }
  }
</style>
</head>
