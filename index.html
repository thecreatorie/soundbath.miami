<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUNDBATH</title>
<meta name="description" content="A music-driven, community-led bathhouse. Coming to Miami.">
<meta property="og:title" content="SOUNDBATH">
<meta property="og:description" content="A music-driven, community-led bathhouse. Coming to Miami.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://thisissoundbath.com">
<link rel="canonical" href="https://thisissoundbath.com">

<!-- Fonts: Fraunces (display) + JetBrains Mono (everything else) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- HubSpot Form Embed Script -->
<script src="https://js-na2.hsforms.net/forms/embed/245902043.js" defer></script>

<style>
  /* ============================
     RESET
     ============================ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  img, svg { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { background: none; border: 0; cursor: pointer; font: inherit; color: inherit; }

  /* ============================
     TOKENS — v4 brief
     ============================ */
  :root {
    --oxblood:        #3A0E08;
    --vermilion:      #E94B26;
    --vermilion-mute: #A93620;
    --cream:          #F4E8D8;
    --cream-dim:      rgba(244,232,216,0.55);
    --cream-line:     rgba(244,232,216,0.18);
  }

  body {
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-weight: 400;
    font-size: 14px;
    line-height: 1.6;
    color: var(--cream);
    background: var(--oxblood);
    overflow-x: hidden;
  }

  /* ============================
     HEADER
     ============================ */
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--oxblood);
    padding: 22px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--vermilion);
  }

  /* ============================
     HERO
     ============================ */
  .hero {
    min-height: calc(100vh - 60px);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 32px 48px;
    position: relative;
  }

  .wordmark-svg {
    display: block;
    width: 100%;
    height: auto;
    margin: 0;
    overflow: visible;
  }

  .wordmark-svg text {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 300px;
    fill: var(--vermilion);
  }

  .hero-subline {
    margin-top: 24px;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--cream);
    max-width: 640px;
  }

  /* ============================
     SECTION 1 — single line, tightened
     ============================ */
  .section-line {
    padding: clamp(96px, 14vh, 160px) 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .section-line p {
    font-family: 'Fraunces', Georgia, serif;
    font-optical-sizing: auto;
    font-weight: 400;
    font-style: italic;
    color: var(--cream);
    font-size: clamp(24px, 3.4vw, 40px);
    line-height: 1.25;
    letter-spacing: -0.01em;
    max-width: 22ch;
  }

  /* ============================
     SECTION 2 — FORM
     ============================ */
  .form-section {
    padding: clamp(80px, 12vh, 140px) 32px;
    border-top: 1px solid var(--cream-line);
  }

  .form-inner {
    max-width: 560px;
    margin: 0 auto;

    /* Override HubSpot's CSS custom properties at this scope.
       The new HubSpot embed exposes these vars to control colors. */
    --hsf-color-text:           #F4E8D8 !important;
    --hsf-color-label:          #F4E8D8 !important;
    --hsf-color-input-label:    #F4E8D8 !important;
    --hsf-color-input-text:     #F4E8D8 !important;
    --hsf-color-placeholder:    rgba(244,232,216,0.55) !important;
    --hsf-color-input-border:   rgba(244,232,216,0.18) !important;
    --hsf-color-button-bg:      #E94B26 !important;
    --hsf-color-button-text:    #F4E8D8 !important;
    --hsf-color-error:          #E94B26 !important;
    --cf-color-label:           #F4E8D8 !important;
    --cf-color-input-text:      #F4E8D8 !important;
    --cf-color-input-bg:        transparent !important;
    --cf-color-button-bg:       #E94B26 !important;
    --cf-color-button-text:     #F4E8D8 !important;
  }

  .form-headline {
    font-family: 'Fraunces', Georgia, serif;
    font-optical-sizing: auto;
    font-weight: 500;
    color: var(--cream);
    font-size: clamp(36px, 6vw, 64px);
    line-height: 1.05;
    letter-spacing: -0.015em;
    margin-bottom: 56px;
  }

  /* ============================
     LABEL TEXT — bulletproof override

     HubSpot wraps label text inside <span> tags and colors them via
     their own stylesheet. We force every text-bearing element inside a
     label (and inside the form generally) to use cream, then re-tint
     just the required-asterisk back to vermilion afterward.
     ============================ */
  .form-inner form label,
  .form-inner form label *,
  .form-inner form legend,
  .form-inner form .hs-form-field > label,
  .form-inner form .hs-form-field > label > span,
  .form-inner form .hs-field-desc,
  .form-inner form .hs-form-checkbox-display,
  .form-inner form .hs-form-checkbox-display span,
  .form-inner form .hs-form-radio-display,
  .form-inner form .hs-form-radio-display span,
  .form-inner form .hs-form-booleancheckbox-display,
  .form-inner form .hs-form-booleancheckbox-display span,
  .form-inner form ul.inputs-list li label,
  .form-inner form ul.inputs-list li label span,
  .form-inner form .legal-consent-container,
  .form-inner form .legal-consent-container * {
    color: #F4E8D8 !important;
  }

  /* Field labels — small mono caps */
  .form-inner form .hs-form-field > label,
  .form-inner form .hs-form-field > label > span {
    font-family: 'JetBrains Mono', ui-monospace, monospace !important;
    font-weight: 400 !important;
    font-size: 11px !important;
    letter-spacing: 0.12em !important;
    text-transform: uppercase !important;
    margin-bottom: 8px !important;
    display: inline-block !important;
  }

  /* Required-asterisk re-tinted vermilion (must come after the cream rule above) */
  .form-inner form .hs-form-required,
  .form-inner form label .hs-form-required,
  .form-inner form label > span.hs-form-required,
  .form-inner form span.hs-form-required {
    color: #E94B26 !important;
    margin-left: 2px !important;
    font-weight: 500 !important;
  }

  /* Checkbox / radio option text — sentence case, slightly bigger */
  .form-inner form ul.inputs-list label,
  .form-inner form ul.inputs-list label span,
  .form-inner form .hs-form-checkbox-display span,
  .form-inner form .hs-form-radio-display span {
    text-transform: none !important;
    letter-spacing: 0 !important;
    font-size: 13px !important;
    font-weight: 400 !important;
  }

  .form-inner form ul.inputs-list {
    list-style: none !important;
    padding: 0 !important;
    margin: 0 !important;
  }
  .form-inner form ul.inputs-list li {
    margin-bottom: 8px !important;
  }

  /* ============================
     INPUT FIELDS
     ============================ */
  .form-inner form input[type="text"],
  .form-inner form input[type="email"],
  .form-inner form input[type="tel"],
  .form-inner form input[type="number"],
  .form-inner form select,
  .form-inner form textarea {
    font-family: 'JetBrains Mono', ui-monospace, monospace !important;
    font-weight: 400 !important;
    font-size: 14px !important;
    color: #F4E8D8 !important;
    background: transparent !important;
    border: 0 !important;
    border-bottom: 1px solid rgba(244,232,216,0.18) !important;
    border-radius: 0 !important;
    padding: 14px 0 !important;
    width: 100% !important;
    outline: none !important;
    transition: border-color 0.2s ease !important;
    box-shadow: none !important;
  }

  .form-inner form input::placeholder,
  .form-inner form textarea::placeholder {
    color: rgba(244,232,216,0.55) !important;
    font-family: 'JetBrains Mono', ui-monospace, monospace !important;
  }

  .form-inner form input:focus,
  .form-inner form select:focus,
  .form-inner form textarea:focus {
    border-bottom-color: #E94B26 !important;
  }

  .form-inner form input[type="checkbox"],
  .form-inner form input[type="radio"] {
    accent-color: #E94B26 !important;
  }

  /* Errors */
  .form-inner form .hs-error-msgs label,
  .form-inner form .hs-error-msg,
  .form-inner form .hs-error-msgs label * {
    font-family: 'JetBrains Mono', ui-monospace, monospace !important;
    color: #E94B26 !important;
    font-size: 11px !important;
    letter-spacing: 0 !important;
    text-transform: lowercase !important;
    margin-top: 6px !important;
  }

  /* Submit button */
  .form-inner form input[type="submit"],
  .form-inner form button[type="submit"],
  .form-inner form .hs-button {
    font-family: 'JetBrains Mono', ui-monospace, monospace !important;
    font-weight: 500 !important;
    font-size: 12px !important;
    letter-spacing: 0.24em !important;
    text-transform: uppercase !important;
    background: #E94B26 !important;
    color: #F4E8D8 !important;
    border: 1px solid #E94B26 !important;
    padding: 18px 40px !important;
    border-radius: 0 !important;
    cursor: pointer !important;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease !important;
    width: auto !important;
    margin-top: 16px !important;
    box-shadow: none !important;
  }

  .form-inner form input[type="submit"]:hover,
  .form-inner form button[type="submit"]:hover,
  .form-inner form .hs-button:hover {
    background: #F4E8D8 !important;
    color: #E94B26 !important;
    border-color: #F4E8D8 !important;
  }

  /* Post-submit "thank you" */
  .form-inner .submitted-message,
  .form-inner .submitted-message * {
    font-family: 'Fraunces', Georgia, serif !important;
    font-style: italic !important;
    font-weight: 400 !important;
    font-size: clamp(28px, 4vw, 40px) !important;
    color: #F4E8D8 !important;
    line-height: 1.2 !important;
  }

  /* Field spacing */
  .form-inner form .hs-form-field,
  .form-inner form fieldset {
    margin-bottom: 28px !important;
    max-width: 100% !important;
  }

  /* Form frame width */
  .form-inner .hs-form-frame,
  .form-inner form { width: 100% !important; }

  /* ============================
     FOOTER
     ============================ */
  .footer {
    border-top: 1px solid var(--cream-line);
    padding: 32px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream-dim);
  }

  .footer-top,
  .footer-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
  }

  .footer-top { margin-bottom: 32px; }
  .footer-brand { color: var(--vermilion); }
  .footer-meta { text-align: right; line-height: 1.8; }

  .footer-links { display: flex; gap: 28px; }
  .footer-links a { transition: color 0.2s ease; }
  .footer-links a:hover { color: var(--vermilion); }

  /* ============================
     RESPONSIVE
     ============================ */
  @media (max-width: 640px) {
    .header { padding: 18px 20px; font-size: 10px; letter-spacing: 0.14em; }
    .hero { padding: 0 20px 36px; }
    .hero-subline { font-size: 12px; }
    .section-line { padding: 80px 20px; }
    .form-section { padding: 80px 20px; }
    .footer { padding: 24px 20px; }
    .footer-top, .footer-bottom {
      flex-direction: column;
      gap: 16px;
      align-items: flex-start;
    }
    .footer-meta { text-align: left; }
  }
</style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <span>Miami, FL</span>
    <span>Bathhouse 01</span>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1 aria-label="SOUNDBATH" style="margin:0;">
      <svg class="wordmark-svg" viewBox="0 0 2000 340" preserveAspectRatio="xMidYMid meet" role="img" aria-hidden="true">
        <text x="0" y="280" textLength="2000" lengthAdjust="spacingAndGlyphs">SOUNDBATH</text>
      </svg>
    </h1>
    <p class="hero-subline">A music-driven, community-led bathhouse. Coming to Miami.</p>
  </section>

  <!-- SECTION 1 — single line -->
  <section class="section-line">
    <p>This is where wellness meets wildness.</p>
  </section>

  <!-- SECTION 2 — FORM -->
  <section class="form-section" id="form">
    <div class="form-inner">
      <h2 class="form-headline">Introduce yourself.</h2>

      <!-- HubSpot Form Embed -->
      <div class="hs-form-frame" data-region="na2" data-form-id="56986621-26f7-4c81-b468-5b8999527218" data-portal-id="245902043"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-top">
      <div class="footer-brand">Soundbath</div>
      <div class="footer-meta">
        <div>Miami &middot; Bathhouse 01</div>
        <div>Est. 2027</div>
      </div>
    </div>
    <div class="footer-bottom">
      <div class="footer-links">
        <a href="https://instagram.com/thisissoundbath" target="_blank" rel="noopener">Instagram</a>
        <a href="https://tiktok.com/@thisissoundbath" target="_blank" rel="noopener">TikTok</a>
        <a href="mailto:hello@thisissoundbath.com">Contact</a>
      </div>
      <div>&copy; 2026</div>
    </div>
  </footer>

</body>
</html>
